name: Build and Deploy Website

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: gitea.chaosdev.gay
  IMAGE_NAME: lucasoskorep/lucaso.io
  APP_NAME: chaosdev

jobs:
  build:
    runs-on: archlinux
    container:
      image: docker:cli
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache nodejs npm git

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          platforms: linux/amd64,linux/arm64
          driver-opts: network=host

      - name: Login to Gitea Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USER }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Get Short SHA
        run: echo "SHORT_SHA=$(echo ${{ github.sha }} | cut -c1-8)" >> $GITHUB_ENV

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          target: release
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.SHORT_SHA }}

  deploy:
    needs: build
    runs-on: archlinux
    container:
      image: dtzar/helm-kubectl:latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Install dependencies
        run: |
          apk add --no-cache nodejs npm git || apt-get update && apt-get install -y nodejs npm git || true

      - name: Checkout code
        uses: actions/checkout@v6

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBECONFIG }}" | base64 -d > ~/.kube/config
          chmod 600 ~/.kube/config

      - name: Deploy with Helm
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-8)
          helm upgrade ${{ env.APP_NAME }} ./helm/chaosdev-site \
            --install \
            --namespace website \
            --set "image.tag=${SHORT_SHA}" \
            -f ./helm/deploy.values.yaml
